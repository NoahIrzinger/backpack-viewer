name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # Regenerate lockfile on Linux — cross-platform lockfiles break on
      # optional deps (rollup native binaries). Mirrors publish.yml.
      - run: rm -rf node_modules package-lock.json && npm install
      - run: npx tsc --noEmit
